openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Inbox Ticket - Event Ticketing Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event management
  - name: tickets
    description: Ticket management
  - name: orders
    description: Order management
  - name: payments
    description: Payment management
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, ongoing, past]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events, admin]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
    put:
      operationId: updateEvent
      tags: [events, admin]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events, admin]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted

  /ticket-types:
    get:
      operationId: listTicketTypes
      tags: [tickets]
      summary: List all ticket types
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of ticket types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketType"
    post:
      operationId: createTicketType
      tags: [tickets, admin]
      summary: Create a ticket type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketTypeInput"
      responses:
        "201":
          description: Ticket type created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketType"

  /orders:
    get:
      operationId: listOrders
      tags: [orders, admin]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, refunded]
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /payments:
    get:
      operationId: listPayments
      tags: [payments, admin]
      summary: List all payments
      parameters:
        - name: method
          in: query
          schema:
            type: string
            enum: [orange_money, mvola, mastercard]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, success, failed, refunded]
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Process a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentInput"
      responses:
        "201":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/revenue-by-month:
    get:
      operationId: getRevenueByMonth
      tags: [admin]
      summary: Get monthly revenue data
      responses:
        "200":
          description: Monthly revenue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

  /admin/sales-by-event:
    get:
      operationId: getSalesByEvent
      tags: [admin]
      summary: Get sales breakdown by event
      responses:
        "200":
          description: Sales by event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventSales"

  /admin/payment-methods:
    get:
      operationId: getPaymentMethodStats
      tags: [admin]
      summary: Get payment method breakdown
      responses:
        "200":
          description: Payment method stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        city:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [upcoming, ongoing, past, cancelled]
        totalCapacity:
          type: integer
        soldTickets:
          type: integer
        createdAt:
          type: string
          format: date-time
        ticketTypes:
          type: array
          items:
            $ref: "#/components/schemas/TicketType"
      required:
        - id
        - title
        - description
        - category
        - location
        - city
        - startDate
        - endDate
        - status
        - totalCapacity
        - soldTickets
        - createdAt

    CreateEventInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        city:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        totalCapacity:
          type: integer
      required:
        - title
        - description
        - category
        - location
        - city
        - startDate
        - endDate
        - totalCapacity

    TicketType:
      type: object
      properties:
        id:
          type: integer
        eventId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        currency:
          type: string
        quantity:
          type: integer
        soldCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - eventId
        - name
        - price
        - currency
        - quantity
        - soldCount
        - createdAt

    CreateTicketTypeInput:
      type: object
      properties:
        eventId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        currency:
          type: string
        quantity:
          type: integer
      required:
        - eventId
        - name
        - price
        - currency
        - quantity

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        ticketTypeId:
          type: integer
        eventId:
          type: integer
        quantity:
          type: integer
        totalAmount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, confirmed, cancelled, refunded]
        createdAt:
          type: string
          format: date-time
        event:
          $ref: "#/components/schemas/Event"
          nullable: true
        ticketType:
          $ref: "#/components/schemas/TicketType"
          nullable: true
        payment:
          $ref: "#/components/schemas/Payment"
          nullable: true
      required:
        - id
        - customerName
        - customerEmail
        - ticketTypeId
        - eventId
        - quantity
        - totalAmount
        - currency
        - status
        - createdAt

    CreateOrderInput:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        ticketTypeId:
          type: integer
        quantity:
          type: integer
        paymentMethod:
          type: string
          enum: [orange_money, mvola, mastercard]
      required:
        - customerName
        - customerEmail
        - ticketTypeId
        - quantity
        - paymentMethod

    Payment:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        method:
          type: string
          enum: [orange_money, mvola, mastercard]
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, success, failed, refunded]
        transactionRef:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        cardLast4:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - method
        - amount
        - currency
        - status
        - createdAt

    CreatePaymentInput:
      type: object
      properties:
        orderId:
          type: integer
        method:
          type: string
          enum: [orange_money, mvola, mastercard]
        phoneNumber:
          type: string
          nullable: true
        cardNumber:
          type: string
          nullable: true
        cardExpiry:
          type: string
          nullable: true
        cardCvv:
          type: string
          nullable: true
      required:
        - orderId
        - method

    AdminStats:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalTicketsSold:
          type: integer
        totalEvents:
          type: integer
        activeEvents:
          type: integer
        pendingOrders:
          type: integer
        revenueGrowth:
          type: number
        ordersGrowth:
          type: number
      required:
        - totalRevenue
        - totalOrders
        - totalTicketsSold
        - totalEvents
        - activeEvents
        - pendingOrders
        - revenueGrowth
        - ordersGrowth

    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
        orders:
          type: integer
      required:
        - month
        - revenue
        - orders

    EventSales:
      type: object
      properties:
        eventId:
          type: integer
        eventTitle:
          type: string
        ticketsSold:
          type: integer
        revenue:
          type: number
        percentage:
          type: number
      required:
        - eventId
        - eventTitle
        - ticketsSold
        - revenue
        - percentage

    PaymentMethodStat:
      type: object
      properties:
        method:
          type: string
        count:
          type: integer
        amount:
          type: number
        percentage:
          type: number
      required:
        - method
        - count
        - amount
        - percentage
